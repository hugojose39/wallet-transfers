name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: swoole, redis
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Coding standards (ECS)
        run: vendor/bin/ecs check

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --ansi --no-progress

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: swoole, redis, pdo_sqlite
          coverage: xdebug

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Unit tests
        run: vendor/bin/phpunit --bootstrap tests/bootstrap.php --testsuite=Unit --colors=always

      - name: Feature tests
        run: vendor/bin/co-phpunit --prepend tests/bootstrap.php --testsuite=Feature --colors=always

      - name: Coverage report
        run: vendor/bin/co-phpunit --prepend tests/bootstrap.php --coverage-html=coverage/ --coverage-clover=coverage/clover.xml --coverage-text
        env:
          XDEBUG_MODE: coverage
